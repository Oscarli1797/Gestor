spring.mustache.suffix=.html
spring.mustache.expose-request-attributes=true
spring.profiles.active=@spring.profiles.active@

# --- Database ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/springdb?serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:oscar}
spring.datasource.password=${DB_PASSWORD:}
# NEVER use create-drop in production. Use 'validate' + Flyway for schema migrations.
spring.jpa.hibernate.ddl-auto=update

# --- Redis ---
spring.redis.database=0
spring.redis.host=${REDIS_HOST:127.0.0.1}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.max-wait=-1
spring.redis.timeout=5000

# --- External API Keys (set via environment variables, never hardcode) ---
api.github.token=${GITHUB_TOKEN:}
api.github.username=${GITHUB_USERNAME:}
api.gitlab.token=${GITLAB_TOKEN:}
api.stackoverflow.key=${STACKOVERFLOW_KEY:}

# --- Mail (Gmail SMTP App Password) ---
mail.username=${MAIL_USERNAME:}
mail.password=${MAIL_PASSWORD:}
