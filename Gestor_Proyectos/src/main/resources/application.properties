spring.profiles.active=@spring.profiles.active@

# --- JWT ---
jwt.secret=${JWT_SECRET:changeme-use-a-long-random-string-in-production-min-32-chars}
# Token expiry in milliseconds (default: 24 hours)
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Database ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/springdb?serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:oscar}
spring.datasource.password=${DB_PASSWORD:}
# Schema is managed by Flyway. Hibernate only validates at startup.
spring.jpa.hibernate.ddl-auto=none

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate: safe for existing DBs that have no flyway_schema_history yet.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# --- Redis ---
spring.redis.database=0
spring.redis.host=${REDIS_HOST:127.0.0.1}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.max-wait=-1
spring.redis.timeout=5000

# --- External API Keys (set via environment variables, never hardcode) ---
api.github.token=${GITHUB_TOKEN:}
api.github.username=${GITHUB_USERNAME:}
api.gitlab.token=${GITLAB_TOKEN:}
api.stackoverflow.key=${STACKOVERFLOW_KEY:}

# --- Mail (Gmail SMTP App Password) ---
mail.username=${MAIL_USERNAME:}
mail.password=${MAIL_PASSWORD:}

# --- Google OAuth2 ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
# Where to send the browser after successful OAuth (frontend callback page)
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback}
